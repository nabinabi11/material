<svg viewBox="0 0 680 370" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
  .c-gray rect { fill: #f3f4f6; stroke: #d1d5db; }
  .c-teal rect { fill: #ccfbf1; stroke: #14b8a6; }
  .c-coral rect { fill: #ffe4e6; stroke: #f43f5e; }
  .panel { fill: #ffffff; stroke: #d1d5db; }
  .ts { fill: #111827; font-family: Arial, sans-serif; }
  .sub { fill: #6b7280; font-family: Arial, sans-serif; }
</style>
</defs>

<text class="ts" x="340" y="24" text-anchor="middle" font-size="16" font-weight="700">Почему modern и legacy ведут агента по-разному</text>
<text class="sub" x="340" y="44" text-anchor="middle" font-size="12">В современном модуле проще найти локальную точку входа. В legacy сначала нужно увидеть скрытые ограничения.</text>

<rect class="panel" x="30" y="66" width="290" height="238" rx="6"/>
<g class="c-teal">
  <rect x="44" y="80" width="262" height="34" rx="6"/>
</g>
<text class="ts" x="175" y="102" text-anchor="middle" font-size="13" font-weight="700">Современный модуль</text>

<g class="c-gray">
  <rect x="44" y="126" width="262" height="34" rx="6"/>
  <rect x="44" y="170" width="262" height="34" rx="6"/>
  <rect x="44" y="214" width="262" height="34" rx="6"/>
  <rect x="44" y="258" width="262" height="34" rx="6"/>
</g>
<text class="ts" x="175" y="148" text-anchor="middle" font-size="12">Явные границы</text>
<text class="ts" x="175" y="192" text-anchor="middle" font-size="12">Тесты рядом</text>
<text class="ts" x="175" y="236" text-anchor="middle" font-size="12">Понятная структура</text>
<text class="ts" x="175" y="280" text-anchor="middle" font-size="12">Локальный проход</text>

<rect class="panel" x="360" y="66" width="290" height="238" rx="6"/>
<g class="c-coral">
  <rect x="374" y="80" width="262" height="34" rx="6"/>
</g>
<text class="ts" x="505" y="102" text-anchor="middle" font-size="13" font-weight="700">Legacy-участок</text>

<g class="c-gray">
  <rect x="374" y="126" width="262" height="34" rx="6"/>
  <rect x="374" y="170" width="262" height="34" rx="6"/>
  <rect x="374" y="214" width="262" height="34" rx="6"/>
  <rect x="374" y="258" width="262" height="34" rx="6"/>
</g>
<text class="ts" x="505" y="148" text-anchor="middle" font-size="12">Скрытые зависимости</text>
<text class="ts" x="505" y="192" text-anchor="middle" font-size="12">Проверок мало</text>
<text class="ts" x="505" y="236" text-anchor="middle" font-size="12">Смешанные роли</text>
<text class="ts" x="505" y="280" text-anchor="middle" font-size="12">Исторические компромиссы</text>

<g class="c-teal">
  <rect x="30" y="324" width="620" height="28" rx="6"/>
</g>
<text class="ts" x="340" y="343" text-anchor="middle" font-size="12">Legacy хуже переносит широкий запрос: сначала карта ограничений, потом локальное изменение</text>
</svg>
