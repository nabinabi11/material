<svg viewBox="0 0 680 370" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
  .c-gray rect { fill: #f3f4f6; stroke: #d1d5db; }
  .c-teal rect { fill: #ccfbf1; stroke: #14b8a6; }
  .c-coral rect { fill: #ffe4e6; stroke: #f43f5e; }
  .c-purple rect { fill: #ede9fe; stroke: #8b5cf6; }
  .panel { fill: #ffffff; stroke: #d1d5db; }
  .ts { fill: #111827; font-family: Arial, sans-serif; }
  .sub { fill: #6b7280; font-family: Arial, sans-serif; }
</style>
</defs>

<rect x="0" y="0" width="680" height="370" fill="#ffffff"/>

<text class="ts" x="340" y="24" text-anchor="middle" font-size="16" font-weight="700">Первый проход: каркас, а не платформа</text>
<text class="sub" x="340" y="44" text-anchor="middle" font-size="12">Сначала доказываем один рабочий сценарий интеграции, а уже потом расширяем устойчивость и архитектуру.</text>

<rect class="panel" x="30" y="66" width="304" height="238" rx="6"/>
<g class="c-teal">
  <rect x="38" y="80" width="288" height="34" rx="6"/>
  <rect x="38" y="126" width="288" height="34" rx="6"/>
  <rect x="38" y="170" width="288" height="34" rx="6"/>
  <rect x="38" y="214" width="288" height="34" rx="6"/>
  <rect x="38" y="258" width="288" height="34" rx="6"/>
</g>
<text class="ts" x="182" y="102" text-anchor="middle" font-size="13" font-weight="700">Первый проход</text>
<text class="ts" x="182" y="148" text-anchor="middle" font-size="12">Один адаптер под один контракт</text>
<text class="ts" x="182" y="192" text-anchor="middle" font-size="12">Один endpoint или SDK-вызов</text>
<text class="ts" x="182" y="236" text-anchor="middle" font-size="12">Одна точка вызова в продукте</text>
<text class="ts" x="182" y="280" text-anchor="middle" font-size="12">Базовые ошибки и env/settings</text>

<rect class="panel" x="346" y="66" width="304" height="238" rx="6"/>
<g class="c-coral">
  <rect x="354" y="80" width="288" height="34" rx="6"/>
  <rect x="354" y="126" width="288" height="34" rx="6"/>
  <rect x="354" y="170" width="288" height="34" rx="6"/>
  <rect x="354" y="214" width="288" height="34" rx="6"/>
  <rect x="354" y="258" width="288" height="34" rx="6"/>
</g>
<text class="ts" x="498" y="102" text-anchor="middle" font-size="13" font-weight="700">Не входит в каркас</text>
<text class="ts" x="498" y="148" text-anchor="middle" font-size="12">Ретраи и backoff</text>
<text class="ts" x="498" y="192" text-anchor="middle" font-size="12">Fallback-провайдер и несколько каналов</text>
<text class="ts" x="498" y="236" text-anchor="middle" font-size="12">Очередь, фоновые джобы, сложная оркестрация</text>
<text class="ts" x="498" y="280" text-anchor="middle" font-size="12">Общая платформа интеграций и абстракции</text>

<g class="c-purple">
  <rect x="30" y="324" width="620" height="28" rx="6"/>
</g>
<text class="ts" x="340" y="343" text-anchor="middle" font-size="12">Хороший первый diff узкий: он доказывает интеграцию и честно откладывает всё лишнее</text>
</svg>
