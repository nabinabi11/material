<svg viewBox="0 0 680 292" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="7" markerHeight="7" refX="5.6" refY="3" orient="auto-start-reverse">
    <path d="M0,0 L0,6 L7,3 z" fill="#444441"/>
  </marker>
  <style>
    .panel { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1; }
    .c-coral rect { fill: #ffe4e6; stroke: #f43f5e; stroke-width: 1; }
    .c-teal rect  { fill: #ccfbf1; stroke: #14b8a6; stroke-width: 1; }
    .c-blue rect  { fill: #dbeafe; stroke: #60a5fa; stroke-width: 1; }
    .c-amber rect { fill: #fef3c7; stroke: #d97706; stroke-width: 1; }
    .c-gray rect  { fill: #f3f4f6; stroke: #d1d5db; stroke-width: 1; }
    .ts  { fill: #111827; font-family: Arial, sans-serif; }
    .sub { fill: #6b7280; font-family: Arial, sans-serif; }
    .arr { fill: none; stroke: #444441; stroke-width: 1.2; stroke-linecap: round; }
  </style>
</defs>
<rect class="panel" x="18" y="44" width="382" height="222" rx="10"/>
<text class="ts" x="209" y="65" text-anchor="middle" font-size="13" font-weight="bold">Host</text>
<text class="sub" x="209" y="80" text-anchor="middle" font-size="11">(Claude Code, Cursor, Codex ...)</text>
<g class="c-coral"><rect x="34" y="90" width="86" height="132" rx="6"/></g>
<text class="ts" x="77" y="156" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="bold">Агент</text>
<g class="c-teal"><rect x="196" y="90" width="90" height="36" rx="6"/></g>
<text class="ts" x="241" y="108" text-anchor="middle" dominant-baseline="middle" font-size="11">Client</text>
<g class="c-teal"><rect x="196" y="143" width="90" height="36" rx="6"/></g>
<text class="ts" x="241" y="161" text-anchor="middle" dominant-baseline="middle" font-size="11">Client</text>
<g class="c-teal"><rect x="196" y="196" width="90" height="36" rx="6"/></g>
<text class="ts" x="241" y="214" text-anchor="middle" dominant-baseline="middle" font-size="11">Client</text>
<line x1="120" y1="108" x2="196" y2="108" class="arr" marker-end="url(#arrow)"/>
<line x1="120" y1="161" x2="196" y2="161" class="arr" marker-end="url(#arrow)"/>
<line x1="120" y1="214" x2="196" y2="214" class="arr" marker-end="url(#arrow)"/>
<g class="c-blue"><rect x="438" y="90" width="220" height="36" rx="6"/></g>
<text class="ts" x="548" y="108" text-anchor="middle" dominant-baseline="middle" font-size="11">MCP-сервер: GitHub</text>
<g class="c-amber"><rect x="438" y="143" width="220" height="36" rx="6"/></g>
<text class="ts" x="548" y="161" text-anchor="middle" dominant-baseline="middle" font-size="11">MCP-сервер: PostgreSQL</text>
<g class="c-gray"><rect x="438" y="196" width="220" height="36" rx="6"/></g>
<text class="ts" x="548" y="214" text-anchor="middle" dominant-baseline="middle" font-size="11">MCP-сервер: Slack</text>
<line x1="286" y1="108" x2="438" y2="108" class="arr" marker-end="url(#arrow)"/>
<line x1="286" y1="161" x2="438" y2="161" class="arr" marker-end="url(#arrow)"/>
<line x1="286" y1="214" x2="438" y2="214" class="arr" marker-end="url(#arrow)"/>
<text fill="#444441" font-family="Arial, sans-serif" font-size="10" x="340" y="280" text-anchor="middle">Три соединения — три независимых Client внутри Host. Серверы — отдельные процессы снаружи.</text>
