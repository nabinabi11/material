<text fill="#6b7280" font-family="Arial,sans-serif" font-size="10" x="340" y="221" text-anchor="middle" dominant-baseline="middle">Skill описывает процедуру. MCP — опциональный усилитель шага, а не замена всей процедуры.</text>
