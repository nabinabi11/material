<svg viewBox="0 0 680 260" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
<path d="M0,0 L0,6 L8,3 z" fill="#444441"/>
</marker>
<style>
  .c-gray rect { fill: #f3f4f6; stroke: #d1d5db; }
  .c-teal rect { fill: #ccfbf1; stroke: #14b8a6; }
  .c-coral rect { fill: #ffe4e6; stroke: #f43f5e; }
  .c-purple rect { fill: #ede9fe; stroke: #8b5cf6; }
  .ts { fill: #111827; font-family: Arial, sans-serif; }
  .arr { stroke: #444441; stroke-width: 1.2; fill: none; }
</style>
</defs>

<text class="ts" font-size="12" x="340" y="18" text-anchor="middle">Накопление ошибок при росте числа решений агента</text>

<text class="ts" font-size="11" x="10" y="28" fill="#444441">вероятность успеха</text>

<line x1="55" y1="35" x2="55" y2="215" class="arr" marker-end="url(#arrow)"/>
<line x1="45" y1="205" x2="660" y2="205" class="arr" marker-end="url(#arrow)"/>

<text class="ts" font-size="10" x="44" y="58" text-anchor="end" fill="#444441">100%</text>
<line x1="47" y1="55" x2="58" y2="55" stroke="#d1d5db" stroke-width="1"/>

<text class="ts" font-size="10" x="44" y="108" text-anchor="end" fill="#444441">65%</text>
<line x1="47" y1="105" x2="58" y2="105" stroke="#d1d5db" stroke-width="1"/>

<text class="ts" font-size="10" x="44" y="158" text-anchor="end" fill="#444441">34%</text>
<line x1="47" y1="155" x2="58" y2="155" stroke="#d1d5db" stroke-width="1"/>

<text class="ts" font-size="10" x="44" y="207" text-anchor="end" fill="#444441">1%</text>

<line x1="57" y1="55" x2="650" y2="55" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
<line x1="57" y1="105" x2="650" y2="105" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
<line x1="57" y1="155" x2="650" y2="155" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>

<polyline points="55,75 175,130 295,160 415,190 535,198 655,203" fill="none" stroke="#f43f5e" stroke-width="2.5"/>

<g class="c-teal">
  <rect x="50" y="70" width="12" height="12" rx="2"/>
</g>
<text class="ts" font-size="10" x="70" y="80" fill="#444441">1 решение → 80%</text>

<g class="c-coral">
  <rect x="170" y="125" width="12" height="12" rx="2"/>
</g>
<text class="ts" font-size="10" x="190" y="135" fill="#444441">3 решения → 51%</text>

<g class="c-coral">
  <rect x="410" y="185" width="12" height="12" rx="2"/>
</g>
<text class="ts" font-size="10" x="430" y="195" fill="#444441">10 решений → 11%</text>

<g class="c-coral">
  <rect x="638" y="192" width="12" height="12" rx="2"/>
</g>
<text class="ts" font-size="10" x="530" y="220" fill="#444441">20 решений → ~1% (0.8²⁰)</text>

<text class="ts" font-size="11" x="340" y="245" text-anchor="middle" fill="#444441">количество самостоятельных решений агента</text>
</svg>
