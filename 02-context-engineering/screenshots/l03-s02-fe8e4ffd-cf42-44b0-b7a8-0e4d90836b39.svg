<svg viewBox="0 0 680 300" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
<path d="M0,0 L0,6 L8,3 z" fill="#444441"/>
</marker>
<style>
  .c-gray rect { fill: #f3f4f6; stroke: #d1d5db; }
  .c-teal rect { fill: #ccfbf1; stroke: #14b8a6; }
  .c-coral rect { fill: #ffe4e6; stroke: #f43f5e; }
  .c-purple rect { fill: #ede9fe; stroke: #8b5cf6; }
  .ts { fill: #111827; font-family: Arial, sans-serif; }
  .arr { stroke: #444441; stroke-width: 1.2; fill: none; }
</style>
</defs>

<text class="ts" font-size="12" x="340" y="18" text-anchor="middle">Три стратегии декомпозиции</text>

<text class="ts" font-size="11" x="110" y="38" text-anchor="middle" font-weight="500">По слоям</text>
<text class="ts" font-size="11" x="340" y="38" text-anchor="middle" font-weight="500">По вертикали (фичи)</text>
<text class="ts" font-size="11" x="570" y="38" text-anchor="middle" font-weight="500">По фазам</text>

<g class="c-gray">
  <rect x="20" y="48" width="180" height="32" rx="6"/>
  <text class="ts" x="110" y="64" text-anchor="middle" dominant-baseline="central" font-size="11">1. Модель данных / схема</text>
</g>
<line x1="110" y1="80" x2="110" y2="96" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray">
  <rect x="20" y="96" width="180" height="32" rx="6"/>
  <text class="ts" x="110" y="112" text-anchor="middle" dominant-baseline="central" font-size="11">2. Бизнес-логика</text>
</g>
<line x1="110" y1="128" x2="110" y2="144" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray">
  <rect x="20" y="144" width="180" height="32" rx="6"/>
  <text class="ts" x="110" y="160" text-anchor="middle" dominant-baseline="central" font-size="11">3. API / контроллеры</text>
</g>
<line x1="110" y1="176" x2="110" y2="192" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray">
  <rect x="20" y="192" width="180" height="32" rx="6"/>
  <text class="ts" x="110" y="208" text-anchor="middle" dominant-baseline="central" font-size="11">4. Тесты</text>
</g>

<line x1="230" y1="48" x2="230" y2="232" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="455" y1="48" x2="455" y2="232" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>

<g class="c-teal">
  <rect x="260" y="48" width="160" height="32" rx="6"/>
  <text class="ts" x="340" y="64" text-anchor="middle" dominant-baseline="central" font-size="11">Минимальная оплата</text>
</g>
<g class="c-teal">
  <rect x="260" y="96" width="160" height="32" rx="6"/>
  <text class="ts" x="340" y="112" text-anchor="middle" dominant-baseline="central" font-size="11">Подписка</text>
</g>
<g class="c-teal">
  <rect x="260" y="144" width="160" height="32" rx="6"/>
  <text class="ts" x="340" y="160" text-anchor="middle" dominant-baseline="central" font-size="11">Возврат средств</text>
</g>
<g class="c-teal">
  <rect x="260" y="192" width="160" height="32" rx="6"/>
  <text class="ts" x="340" y="208" text-anchor="middle" dominant-baseline="central" font-size="11">Промокоды</text>
</g>
<text class="ts" font-size="10" x="340" y="244" text-anchor="middle" fill="#444441">каждый — полный стек</text>

<g class="c-purple">
  <rect x="490" y="48" width="170" height="32" rx="6"/>
  <text class="ts" x="575" y="64" text-anchor="middle" dominant-baseline="central" font-size="11">1. Каркас (заглушки)</text>
</g>
<line x1="575" y1="80" x2="575" y2="96" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple">
  <rect x="490" y="96" width="170" height="32" rx="6"/>
  <text class="ts" x="575" y="112" text-anchor="middle" dominant-baseline="central" font-size="11">2. Основная логика</text>
</g>
<line x1="575" y1="128" x2="575" y2="144" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple">
  <rect x="490" y="144" width="170" height="32" rx="6"/>
  <text class="ts" x="575" y="160" text-anchor="middle" dominant-baseline="central" font-size="11">3. Edge-cases</text>
</g>
<line x1="575" y1="176" x2="575" y2="192" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple">
  <rect x="490" y="192" width="170" height="32" rx="6"/>
  <text class="ts" x="575" y="208" text-anchor="middle" dominant-baseline="central" font-size="11">4. Оптимизация</text>
</g>

<text class="ts" font-size="10" x="110" y="244" text-anchor="middle" fill="#444441">техническая глубина</text>
<text class="ts" font-size="10" x="575" y="244" text-anchor="middle" fill="#444441">последовательное уточнение</text>

<text class="ts" font-size="11" x="340" y="280" text-anchor="middle" fill="#444441">Принцип: каждый шаг оставляет проект в рабочем состоянии</text>
</svg>
