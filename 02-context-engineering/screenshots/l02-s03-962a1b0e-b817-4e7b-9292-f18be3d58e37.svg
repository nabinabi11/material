<svg viewBox="0 0 680 260" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
  .c-gray rect { fill: #f3f4f6; stroke: #d1d5db; }
  .c-teal rect { fill: #ccfbf1; stroke: #14b8a6; }
  .c-coral rect { fill: #ffe4e6; stroke: #f43f5e; }
  .c-purple rect { fill: #ede9fe; stroke: #8b5cf6; }
  .ts { fill: #111827; font-family: Arial, sans-serif; }
</style>
</defs>

<text class="ts" font-size="12" x="170" y="18" text-anchor="middle">Чистая сессия</text>
<text class="ts" font-size="12" x="510" y="18" text-anchor="middle">Сессия после нескольких задач</text>

<rect x="30" y="28" width="280" height="200" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
<text class="ts" font-size="11" x="170" y="44" text-anchor="middle">200 000 токенов</text>

<g class="c-purple">
  <rect x="40" y="52" width="260" height="28" rx="4"/>
  <text class="ts" x="170" y="66" text-anchor="middle" font-size="11" dominant-baseline="central">CLAUDE.md / системный промпт (~1%)</text>
</g>
<g class="c-teal">
  <rect x="40" y="84" width="260" height="28" rx="4"/>
  <text class="ts" x="170" y="98" text-anchor="middle" font-size="11" dominant-baseline="central">Текущий запрос и 1–2 файла (~10%)</text>
</g>
<rect x="40" y="116" width="260" height="104" rx="4" fill="#f9fafb" stroke="#e5e7eb"/>
<text class="ts" font-size="11" x="170" y="172" text-anchor="middle" fill="#9ca3af">свободно (~89%)</text>

<rect x="370" y="28" width="280" height="200" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
<text class="ts" font-size="11" x="510" y="44" text-anchor="middle">200 000 токенов</text>

<g class="c-purple">
  <rect x="380" y="52" width="260" height="28" rx="4"/>
  <text class="ts" x="510" y="66" text-anchor="middle" font-size="11" dominant-baseline="central">CLAUDE.md / системный промпт</text>
</g>
<g class="c-teal">
  <rect x="380" y="84" width="260" height="28" rx="4"/>
  <text class="ts" x="510" y="98" text-anchor="middle" font-size="11" dominant-baseline="central">Прочитанные файлы (задача 1–2)</text>
</g>
<g class="c-teal">
  <rect x="380" y="116" width="260" height="28" rx="4"/>
  <text class="ts" x="510" y="130" text-anchor="middle" font-size="11" dominant-baseline="central">Вывод команд / тестов</text>
</g>
<g class="c-teal">
  <rect x="380" y="148" width="260" height="28" rx="4"/>
  <text class="ts" x="510" y="162" text-anchor="middle" font-size="11" dominant-baseline="central">История диалога</text>
</g>
<g class="c-coral">
  <rect x="380" y="180" width="260" height="40" rx="4"/>
  <text class="ts" x="510" y="200" text-anchor="middle" font-size="11" dominant-baseline="central">Новый запрос — места почти нет</text>
</g>

<text class="ts" font-size="11" x="170" y="246" text-anchor="middle" fill="#444441">≈11% использовано</text>
<text class="ts" font-size="11" x="510" y="246" text-anchor="middle" fill="#f43f5e">≈92% использовано — качество падает</text>
</svg>
